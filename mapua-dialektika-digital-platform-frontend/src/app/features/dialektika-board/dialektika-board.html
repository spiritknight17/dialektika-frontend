<app-header></app-header>

<div class="dashboard">
  <h1 class="title">Dialektika Newsfeed</h1>

  <div class="post" *ngFor="let post of posts; trackBy: trackPost">
    <div class="post-header">
      <h2>{{ post.title }}</h2>
      <span class="date">{{ post.date_created }}</span>
    </div>

    <p class="description">
      {{ post.description }}
    </p>

    <div class="attachment" *ngIf="post.attachment">

  <!-- If Image -->
  <img
    *ngIf="isImage(post.attachment)"
    [src]="post.attachment"
    class="post-image"
  />

  <!-- If File -->
  <div *ngIf="!isImage(post.attachment)" class="file-attachment">

    <span class="file-icon">📎</span>

    <a
      [href]="post.attachment"
      target="_blank"
      download
    >
      {{ getFileName(post.attachment) }}
    </a>

  </div>

</div>

    <!-- Comments -->

    <div class="comment-section">

  <h3>Comments</h3>

  <div class="comment" *ngFor="let comment of comments[post.id] ?? []">

    <!-- Normal view -->
    <div *ngIf="editingCommentId !== comment.id" class="comment-row">

      <span class="comment-text">
        {{ comment.comment }}
      </span>

      <div class="comment-actions">

        <button
          class="edit-btn"
          (click)="startEdit(comment)"
        >
          Edit
        </button>

        <button
          class="delete-btn"
          (click)="deleteComment(comment.id, post.id)"
        >
          Delete
        </button>

      </div>

    </div>

    <!-- Edit mode -->
    <div *ngIf="editingCommentId === comment.id" class="comment-edit">

      <input
        type="text"
        [(ngModel)]="editCommentText"
      />

      <button
        class="save-btn"
        (click)="updateComment(comment.id, post.id)"
      >
        Save
      </button>

      <button
        class="cancel-btn"
        (click)="cancelEdit()"
      >
        Cancel
      </button>

    </div>

  </div>

  <!-- Add comment -->

  <div class="add-comment">

    <input
      type="text"
      placeholder="Write a comment..."
      [(ngModel)]="newComment[post.id]"
    />

    <button (click)="addComment(post.id)">
      Post
    </button>

  </div>

</div>
  </div>
</div>
