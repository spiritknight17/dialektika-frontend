<app-header></app-header>
<main>
    <app-main-label icon="post_add" label="Create Post"></app-main-label>
    <div class="create-post">
        <div class = "create-post-image-dropbox" [class.active]="imageUrl" >
            <input type="file" #fileInput (change)="onFileSelected($event)" accept="image/*" hidden>
            <div class="create-post-image-content" *ngIf="!imageUrl">
                <i class='bx bx-cloud-upload'></i>
                <h3>Upload Image</h3>
                <p>Image is optional, you can still post announcements if you don't wish to upload an image.</p>
                <button type="button" class="select-image" (click)="fileInput.click()">Select Image</button>
            </div>
            <img *ngIf="imageUrl" [src]="imageUrl" alt="preview">
        </div>
        <div class = "create-post-text-form">

        </div>
    </div>
    <app-main-label icon="manage_accounts" label="Manage Users"></app-main-label>
    <div class="manage-user">
        <div class="manage-user-top-bar">
            <search>
                <form>
                    <div class="search-wrapper">
                        <input type="text" [formControl]="searchControl" class="userSearch" placeholder="Search users...">
                        <button type="button" class="user-icon-btn" >
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                </form>
            </search>
            <button type="button" class="filter-icon-btn" >
                <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 5h18l-7 8v5l-4-2v-3L3 5z"></path>
                </svg>
                Filter Users
            </button>
            <button type="button" class="add-user-icon-btn" >
                <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M5.5 21a6.5 6.5 0 0 1 13 0"></path>
                    <line x1="19" y1="8" x2="19" y2="14"></line>
                    <line x1="16" y1="11" x2="22" y2="11"></line>
                </svg>
                Add User
            </button>
            <button type="button" class="settings-icon-btn" >
                <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.06V21a2 2 0 1 1-4 0v-.08a1.7 1.7 0 0 0-.4-1.06 1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.06-.4H3a2 2 0 1 1 0-4h.08a1.7 1.7 0 0 0 1.06-.4 1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6c.3-.2.65-.4 1-.6a1.7 1.7 0 0 0 .4-1.06V3a2 2 0 1 1 4 0v.08c0 .4.15.78.4 1.06.35.2.7.4 1 .6a1.7 1.7 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.4.5-.5 1.15-.33 1.82.2.3.4.65.6 1 .28.25.66.4 1.06.4H21a2 2 0 1 1 0 4h-.08c-.4 0-.78.15-1.06.4-.2.35-.4.7-.6 1z"></path>
                </svg>
                Edit User
            </button>
            <button type="button" class="remove-user-icon-btn" >
                <svg viewBox="0 0 24 24" width="25" height="25" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M5.5 21a6.5 6.5 0 0 1 13 0"></path>
                    <line x1="16" y1="11" x2="22" y2="11"></line>
                </svg>
                Remove User
            </button>
        </div>
        <div class="layout-label">
            <h3>Username</h3>
            <h3>Email</h3>
            <h3>ID</h3>
            <h3>Role</h3>
        </div>
        <hr>
        <div class="users">
            <app-manage-access-users [users]="userList"></app-manage-access-users>
        </div>
    </div>
    <script>
        (function(){
            const DEBUG_BYPASS = true;
            if (!DEBUG_BYPASS) return;
            window.__DIA_DEBUG_BYPASS = true;
            const fakeFetch = async () => new Response('{}', { 
                status: 200, headers: { 'Content-Type': 'application/json' } });
            window.fetch = fakeFetch;
        }());
    </script>
    <script>
        (function(){
            if (window.__DIA_DEBUG_BYPASS) {
                document.body.innerHTML = '<main><h1 style="text-align: center; margin-top: 50px;">Debug Bypass Enabled</h1><p style="text-align: center;">The user list is not displayed due to the debug bypass. Please disable the debug bypass to see the user list.</p></main>';
                return;
            }
        }());
    </script>
</main>
